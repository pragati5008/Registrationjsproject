 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Registration Form</h2>

        <form id="regForm" onsubmit="return validateForm()">

            <!-- Full Name -->
            <div class="input-group">
                <label>Full Name:</label>
                <input type="text" id="name" placeholder="Enter full name">
                <small class="error"></small>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label>Email:</label>
                <input type="text" id="email" placeholder="Enter email">
                <small class="error"></small>
            </div>

            <!-- Phone -->
            <div class="input-group">
                <label>Phone Number:</label>
                <input type="text" id="phone" placeholder="Enter 10-digit number">
                <small class="error"></small>
            </div>

            <!-- Date of Birth -->
            <div class="input-group">
                <label>Date of Birth:</label>
                <input type="date" id="dob">
                <small class="error"></small>
            </div>

            <!-- Gender -->
            <div class="input-group">
                <label>Gender:</label>
                <div class="gender-box">
                    <label><input type="radio" name="gender" value="Male"> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
                <small class="error"></small>
            </div>

            <!-- Address -->
            <div class="input-group">
                <label>Address:</label>
                <textarea id="address" placeholder="Enter address"></textarea>
                <small class="error"></small>
            </div>

            <!-- City -->
            <div class="input-group">
                <label>City:</label>
                <input type="text" id="city" placeholder="Enter city">
                <small class="error"></small>
            </div>

            <!-- Country -->
            <div class="input-group">
                <label>Country:</label>
                <select id="country">
                    <option value="">Select Country</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Canada">Canada</option>
                </select>
                <small class="error"></small>
            </div>

            <!-- High School Percentage -->
            <div class="input-group">
                <label>High School Percentage:</label>
                <input type="number" id="highschool" placeholder="Enter %">
                <small class="error"></small>
            </div>

            <!-- 12th Percentage -->
            <div class="input-group">
                <label> Intermediate Percentage:</label>
                <input type="number" id="twelve" placeholder="Enter %">
                <small class="error"></small>
            </div>

            <!-- Area of Interest in ML -->
            <div class="input-group">
                <label>Area of Interest in ML:</label>
                <input type="text" id="interest" placeholder="Example: Deep Learning, NLP, CV">
                <small class="error"></small>
            </div>

            <!-- Current Education -->
            <div class="input-group">
                <label>Current Education:</label>
                <input type="text" id="education" placeholder="Example: B.Tech, BCA, etc.">
                <small class="error"></small>
            </div>
            <!-- Years of experience-->
            <div class="input-group">
                <label>Years of Experience:</label>
                <input type="text" id="experience" placeholder=" ">
                <small class="error"></small>
            </div>
             <div class="input-group">
    <label>Why do you want to attend this conference:</label>
    <input type="text" id="conferenceReason" placeholder=" ">
    <small class="error"></small>
</div>




            <button type="submit">Register</button>

        </form>
    </div>

<script src="script.js"></script>
</body>
</html>
